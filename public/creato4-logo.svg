<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Shrikhand&amp;family=Grand+Hotel&amp;family=Fredoka:wght@700&amp;display=swap');
      
      .bg-fill { fill: #1C482A; }
      .pattern-line { fill: none; stroke: #14371F; stroke-width: 20; stroke-linecap: round; stroke-linejoin: round; }
      .text-cream { fill: #F6F1E5; }
      
      .font-the {
        font-family: 'Grand Hotel', 'Brush Script MT', cursive;
        font-size: 68px;
        font-weight: 400;
      }
      .font-main {
        font-family: 'Shrikhand', 'Fredoka', 'Cooper Black', 'Impact', sans-serif;
        font-size: 102px;
        letter-spacing: -2px;
      }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0E2314" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Forest Green Container Canvas -->
  <rect width="500" height="500" rx="48" class="bg-fill" />

  <!-- Background Wavy Organic Concentric Lines -->
  <g opacity="0.95">
    <!-- Concentric Circles Top Right -->
    <circle cx="390" cy="90" r="280" class="pattern-line" />
    <circle cx="390" cy="90" r="230" class="pattern-line" />
    <circle cx="390" cy="90" r="180" class="pattern-line" />
    <circle cx="390" cy="90" r="130" class="pattern-line" />
    <circle cx="390" cy="90" r="80" class="pattern-line" />

    <!-- S-Curves Left and Bottom -->
    <path d="M -30,120 C 80,180 20,320 -40,400" class="pattern-line" />
    <path d="M -20,220 C 110,280 40,420 10,520" class="pattern-line" />
    <path d="M 60,520 C 100,380 220,440 320,530" class="pattern-line" />
    <path d="M -40,30 C 140,80 80,240 -20,320" class="pattern-line" />
    <path d="M 180,-20 C 220,100 120,220 220,340" class="pattern-line" />
    <path d="M 140,530 C 220,400 360,460 480,520" class="pattern-line" />
  </g>

  <!-- Centered Retro Groovy Logo Text ("the Creato4 Lab") -->
  <g filter="url(#shadow)">
    <!-- Line 1: "the" -->
    <text x="250" y="172" text-anchor="middle" class="text-cream font-the">the</text>

    <!-- Line 2: "Creato4" -->
    <text x="250" y="278" text-anchor="middle" class="text-cream font-main">Creato4</text>

    <!-- Line 3: "Lab" -->
    <text x="250" y="384" text-anchor="middle" class="text-cream font-main">Lab</text>
  </g>
</svg>
